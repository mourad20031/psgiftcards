<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon GO · 550 Coin Giveaway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #FFFFFF;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            line-height: 1.5;
            font-weight: 400;
        }

        /* main card – purely white, subtle shadow for depth, crisp */
        .card {
            max-width: 800px;
            width: 100%;
            background: #FFFFFF;
            border-radius: 48px;
            padding: 3.5rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            text-align: center;
            border: 1px solid #F0F0F0;
        }

        /* --- 16:9 logo area --- */
        .logo-container {
            width: 100%;
            max-width: 680px;
            margin: 0 auto 2.5rem auto;
        }

        .logo-frame {
            aspect-ratio: 16 / 9;
            width: 100%;
            background: #FFFFFF;
            border: 1.5px dashed #CCCCCC;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            transition: border 0.2s ease;
        }

        .logo-image {
            max-width: 85%;
            max-height: 80%;
            object-fit: contain;
            display: block;
        }

        /* short description under logo */
        .hero-description {
            font-size: 1.6rem;
            font-weight: 380;
            max-width: 580px;
            margin: 0 auto 2rem auto;
            color: #111111;
            letter-spacing: -0.01em;
            line-height: 1.4;
        }

        .hero-description strong {
            font-weight: 620;
            background: #FFFFFF;
            border-bottom: 2px solid #000;
            padding-bottom: 2px;
        }

        /* winners badge */
        .winners-badge {
            display: inline-block;
            margin: 0 0 2rem 0;
            font-size: 1.2rem;
            background: #FFFFFF;
            border: 1.5px solid #000;
            border-radius: 40px;
            padding: 0.4rem 1.8rem;
            font-weight: 500;
            color: #000;
        }

        /* --- PROFESSIONAL EMAIL FORM (compact & responsive) --- */
        .form-section {
            max-width: 460px;
            margin: 0 auto;
            text-align: left;           /* label aligned left for clarity */
        }

        .email-label {
            display: block;
            font-size: 0.95rem;
            font-weight: 500;
            color: #222;
            margin-bottom: 0.4rem;
            margin-left: 0.5rem;
            letter-spacing: 0.2px;
            text-transform: uppercase;
            opacity: 0.75;
        }

        .email-row {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        /* email input – smaller, pro proportions */
        .email-input {
            width: 100%;
            padding: 0.9rem 1.5rem;
            font-size: 1.1rem;
            font-family: inherit;
            border: 2px solid #E0E0E0;
            border-radius: 60px;
            outline: none;
            background: #FFFFFF;
            color: #000000;
            transition: border 0.15s, box-shadow 0.15s;
            font-weight: 400;
        }

        .email-input:focus {
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.03);
        }

        .email-input::placeholder {
            color: #AAAAAA;
            font-weight: 350;
            font-size: 1rem;
        }

        /* primary button – black, substantial, modern */
        .enter-btn {
            background: #000000;
            color: #FFFFFF;
            border: none;
            border-radius: 60px;
            padding: 0.9rem 2rem;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
            white-space: nowrap;
            border: 2px solid #000000;
            line-height: 1.2;
            box-shadow: 0 2px 0 #333;
            width: 100%;
        }

        .enter-btn:hover {
            background: #1A1A1A;
            border-color: #1A1A1A;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .enter-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        /* feedback message */
        .form-feedback {
            font-size: 0.95rem;
            margin-top: 1rem;
            min-height: 2rem;
            color: #2b7a2b;
            text-align: center;
        }

        /* fine print */
        .fine-print {
            margin-top: 2.8rem;
            font-size: 0.9rem;
            color: #777777;
            border-top: 1px solid #EEEEEE;
            padding-top: 2rem;
        }

        /* ===== RESPONSIVE PHONE FIXES ===== */
        @media (max-width: 550px) {
            .card {
                padding: 2rem 1.5rem;
                border-radius: 36px;
            }
            .hero-description {
                font-size: 1.4rem;
            }
            .winners-badge {
                font-size: 1rem;
                padding: 0.3rem 1.2rem;
                margin-bottom: 1.8rem;
            }
            /* make email input and button comfortable but not oversized */
            .email-input {
                padding: 0.8rem 1.3rem;
                font-size: 1rem;
            }
            .enter-btn {
                padding: 0.8rem 1.5rem;
                font-size: 1.1rem;
            }
            .email-label {
                font-size: 0.9rem;
                margin-bottom: 0.3rem;
            }
        }

        /* even smaller devices */
        @media (max-width: 380px) {
            .card {
                padding: 1.8rem 1rem;
            }
            .hero-description {
                font-size: 1.3rem;
            }
            .email-input {
                padding: 0.75rem 1.2rem;
            }
        }

        /* misc */
        .logo-frame:hover {
            border-color: #999;
        }

        .note-mute {
            opacity: 0.5;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <!-- 16:9 logo area (unchanged, prominent) -->
        <div class="logo-container">
            <div class="logo-frame">
                <img class="logo-image" 
                     src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 160 90'%3E%3Crect width='160' height='90' fill='%23ffffff'/%3E%3Ctext x='18' y='55' font-family='Arial, sans-serif' font-size='28' font-weight='600' fill='%23333'%3EPOKéMON GO%3C/text%3E%3Ccircle cx='122' cy='45' r='16' fill='none' stroke='%23333' stroke-width='2'/%3E%3Ccircle cx='122' cy='45' r='5' fill='none' stroke='%23333' stroke-width='2'/%3E%3Cpath d='M106 45 L118 45 M126 45 L138 45' stroke='%23333' stroke-width='2' /%3E%3C/svg%3E"
                     alt="Pokémon GO logo (16:9)">
            </div>
        </div>

        <!-- short engaging description -->
        <div class="hero-description">
            ⚡ <strong>550 PokéCoins</strong> for three winners.<br>
            Enter your email for a chance to power up.
        </div>

        <!-- winners badge (clean) -->
        <div class="winners-badge">🎁 3 winners · drawn weekly</div>

        <!-- PROFESSIONAL EMAIL FORM with label & compact input (responsive) -->
        <div class="form-section">
            <form id="giveawayForm" onsubmit="handleSubmit(event);">
                <!-- clear label telling user to enter email (above the bar) -->
                <label for="email" class="email-label">ENTER YOUR EMAIL</label>
                <div class="email-row">
                    <input type="email" 
                           class="email-input" 
                           id="email" 
                           name="email" 
                           placeholder="trainer@example.com"
                           required
                           pattern="[^@\s]+@[^@\s]+\.[^@\s]+"
                           title="Enter a valid email address">
                    <button type="submit" class="enter-btn">Enter Giveaway</button>
                </div>
                <!-- feedback area (for demo) -->
                <div id="formFeedback" class="form-feedback"></div>
            </form>
        </div>

        <!-- fine print -->
        <div class="fine-print">
            <span>✔ no spam · one entry per email · ends 04/30</span><br>
            <span class="note-mute">© Pokémon GO giveaway concept</span>
        </div>
    </div>

    <script>
        // demo form handler – pro, non-intrusive, shows feedback
        function handleSubmit(event) {
            event.preventDefault();   // stop page reload

            const emailInput = document.getElementById('email');
            const email = emailInput.value.trim();
            const feedback = document.getElementById('formFeedback');

            if (!email) {
                feedback.style.color = "#b33";
                feedback.innerText = "⨯ please enter your email address.";
                return;
            }

            const validPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!validPattern.test(email)) {
                feedback.style.color = "#b33";
                feedback.innerText = "⨯ that email doesn’t look quite right.";
                return;
            }

            // success message — demo only
            feedback.style.color = "#2b7a2b";
            feedback.innerText = "✓ you're in! (demo – actual entry would be recorded)";

            // optionally reset after a few seconds
            setTimeout(() => {
                feedback.innerText = "";
            }, 4000);

            // for real implementation: action="https://your-server.com/entry" method="POST"
            // or redirect: window.location.href = "https://your-giveaway.com/thankyou";
        }
    </script>
</body>
</html>
