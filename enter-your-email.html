<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon GO · 550 Coin Giveaway</title>
    <meta name="description" content="Enter for a chance to win 550 PokéCoins">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #FFFFFF;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            line-height: 1.5;
            font-weight: 400;
        }

        /* main card – purely white, subtle shadow for depth */
        .card {
            max-width: 720px;
            width: 100%;
            background: #FFFFFF;
            border-radius: 48px;
            padding: 3rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            text-align: center;
            border: 1px solid #F0F0F0;
        }

        /* logo container */
        .logo-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 2rem auto;
        }

        .logo-frame {
            aspect-ratio: 16 / 9;
            width: 100%;
            background: #FFFFFF;
            border: 1.5px dashed #CCCCCC;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            overflow: hidden;
        }

        .logo-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* main headline */
        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0.8rem 0 0.5rem 0;
            line-height: 1.2;
            color: #000000;
        }

        .prize-badge {
            display: inline-block;
            background: #FFFFFF;
            border: 2px solid #000;
            border-radius: 60px;
            padding: 0.3rem 1.8rem;
            font-size: 1.3rem;
            font-weight: 600;
            margin: 1rem 0 1.8rem 0;
            color: #000;
        }

        /* description */
        .description {
            font-size: 1.3rem;
            font-weight: 350;
            max-width: 500px;
            margin: 1.2rem auto 2rem auto;
            color: #1a1a1a;
        }

        /* email form - clean and professional */
        .form-section {
            max-width: 440px;
            margin: 0 auto;
            text-align: left;
        }

        .email-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #222;
            margin-bottom: 0.4rem;
            margin-left: 0.5rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .email-row {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .email-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border: 2px solid #E0E0E0;
            border-radius: 60px;
            outline: none;
            background: #FFFFFF;
            transition: border 0.15s, box-shadow 0.15s;
        }

        .email-input:focus {
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.03);
        }

        .email-input::placeholder {
            color: #AAAAAA;
            font-weight: 350;
        }

        .enter-btn {
            background: #000000;
            color: #FFFFFF;
            border: 2px solid #000000;
            border-radius: 60px;
            padding: 1rem 2rem;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            width: 100%;
            box-shadow: 0 2px 0 #333;
        }

        .enter-btn:hover {
            background: #1A1A1A;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .enter-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        /* status messages */
        .status-message {
            padding: 0.8rem;
            border-radius: 40px;
            margin-top: 1rem;
            font-weight: 500;
            display: none;
            text-align: center;
            font-size: 0.95rem;
        }

        .status-success {
            background: #e8f5e9;
            border: 2px solid #2e7d32;
            color: #1b5e20;
        }

        .status-error {
            background: #ffebee;
            border: 2px solid #c62828;
            color: #b71c1c;
        }

        /* fine print */
        .fine-print {
            margin-top: 2.5rem;
            font-size: 0.9rem;
            color: #777777;
            border-top: 1px solid #EEEEEE;
            padding-top: 1.8rem;
        }

        /* responsive */
        @media (max-width: 550px) {
            .card {
                padding: 2rem 1.5rem;
            }
            h1 {
                font-size: 2.2rem;
            }
            .prize-badge {
                font-size: 1.1rem;
            }
            .description {
                font-size: 1.2rem;
            }
            .enter-btn {
                font-size: 1.2rem;
                padding: 0.9rem 1.5rem;
            }
        }

        @media (max-width: 380px) {
            .card {
                padding: 1.5rem 1rem;
            }
            h1 {
                font-size: 1.9rem;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <!-- logo area (your 16:9 image) -->
        <div class="logo-container">
            <div class="logo-frame">
                <img class="logo-image" src="https://i.postimg.cc/9z3NQJc1/Pokemon-go-image-1-new.webp" alt="Pokémon GO">
            </div>
        </div>

        <!-- title & reward -->
        <h1>550 PokéCoins<br>giveaway</h1>
        <div class="prize-badge">⚡ THREE WINNERS ⚡</div>
        <div class="description">
            Enter your email for a chance to win. 
            No spam, just one weekly draw.
        </div>

        <!-- EMAIL FORM (with working Google Apps Script) -->
        <div class="form-section">
            <form id="giveawayForm">
                <label for="email" class="email-label">YOUR EMAIL ADDRESS</label>
                <div class="email-row">
                    <input type="email" 
                           class="email-input" 
                           id="email" 
                           name="email" 
                           placeholder="trainer@example.com"
                           required
                           pattern="[^@\s]+@[^@\s]+\.[^@\s]+"
                           title="Enter a valid email address">
                    <button type="submit" class="enter-btn" id="submitBtn">Enter Giveaway</button>
                </div>
            </form>

            <!-- status messages -->
            <div id="successMessage" class="status-message status-success" style="display: none;">
                ✅ You're in! (email recorded)
            </div>
            <div id="errorMessage" class="status-message status-error" style="display: none;">
                ❌ Please enter a valid email
            </div>
        </div>

        <div class="fine-print">
            ✔ no spam · one entry per email · ends 04/30<br>
            <span style="opacity:0.5;">© Pokémon GO giveaway concept</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('giveawayForm');
            const emailInput = document.getElementById('email');
            const submitBtn = document.getElementById('submitBtn');
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');

            // Email validation
            function isValidEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }

            // Hide messages helper
            function hideMessages() {
                successMsg.style.display = 'none';
                errorMsg.style.display = 'none';
            }

            // Show message
            function showMessage(element, text) {
                hideMessages();
                element.textContent = text;
                element.style.display = 'block';
                if (element === errorMsg) {
                    setTimeout(() => {
                        errorMsg.style.display = 'none';
                    }, 4000);
                }
            }

            // Real-time validation indicator
            emailInput.addEventListener('input', function() {
                if (isValidEmail(this.value.trim())) {
                    this.style.borderColor = '#2e7d32';
                } else {
                    this.style.borderColor = '#E0E0E0';
                }
                hideMessages();
            });

            // Form submission
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const email = emailInput.value.trim();

                if (!isValidEmail(email)) {
                    showMessage(errorMsg, '❌ Please enter a valid email');
                    emailInput.style.borderColor = '#c62828';
                    return;
                }

                // Show loading state
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = 'Submitting...';
                submitBtn.disabled = true;

                try {
                    // Your Google Apps Script URL
                    const scriptUrl = 'https://script.google.com/macros/s/AKfycbyiNMOfUEI9wMvHMat34sNz1k_jSK6UMuQpQOygDPvkvldz2FybvLdMkw1948PaqEKCww/exec';
                    
                    // Prepare data
                    const formData = new FormData();
                    formData.append('email', email);
                    formData.append('timestamp', new Date().toISOString());

                    // Send to Google Sheets
                    const response = await fetch(scriptUrl, {
                        method: 'POST',
                        body: formData
                    });

                    // Check if response is OK (even if it's a redirect, fetch follows it)
                    if (response.ok || response.type === 'opaqueredirect') {
                        showMessage(successMsg, '✅ Email saved successfully!');
                        form.reset();
                        emailInput.style.borderColor = '#E0E0E0';
                        
                        // Auto-hide success after 5 seconds
                        setTimeout(() => {
                            successMsg.style.display = 'none';
                        }, 5000);
                    } else {
                        throw new Error('Network response was not ok');
                    }

                } catch (error) {
                    console.error('Error:', error);
                    showMessage(errorMsg, '⚠️ Server error. Please try again later.');
                } finally {
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
